<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深渊测试丨你的绝对占有欲与控制欲指数</title>
<style>
  :root{
    --main-blue:#cc0000;
    --main-blue-dark:#880000;
    --bg-grey:#050505;
    --card-bg:#121212;
    --text-dark:#ff3333;
    --text-grey:#aa0000;
    --border-grey:#330000;
    --danger:#ff0000;
    --warn-bg:#220000;
    --warn-border:#550000;
    --success:#cc0000;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",Arial,sans-serif;
    background:var(--bg-grey);
    color:var(--text-dark);
    padding-bottom:80px;
  }
  #progressBar{
    position:sticky;
    top:0;
    left:0;
    width:100%;
    height:6px;
    background:#220000;
    z-index:999;
  }
  #progressFill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--main-blue),#ff0000);
    transition:width .25s ease;
  }
  header.top{
    background:linear-gradient(135deg,var(--main-blue-dark),#330000);
    color:#ffcccc;
    padding:34px 20px 46px;
    text-align:center;
    position:relative;
  }
  header.top h1{
    margin:0 0 10px;
    font-size:24px;
    letter-spacing:1px;
    color:#ff0000;
    text-shadow: 0 0 10px rgba(255,0,0,0.5);
  }
  header.top p{
    margin:4px auto;
    max-width:560px;
    font-size:14px;
    line-height:1.7;
    opacity:.92;
  }
  .meta-row{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:14px;
    font-size:12px;
    flex-wrap:wrap;
  }
  .meta-row span{
    background:rgba(255,0,0,.18);
    padding:4px 10px;
    border-radius:20px;
    border: 1px solid #550000;
  }

  .container{
    max-width:680px;
    margin:-26px auto 0;
    padding:0 16px;
  }

  .nickname-card{
    background:var(--card-bg);
    border-radius:12px;
    padding:18px 20px;
    box-shadow:0 6px 18px rgba(255,0,0,.05);
    margin-bottom:18px;
    border: 1px solid var(--border-grey);
  }
  .nickname-card label{
    font-size:13px;
    color:var(--text-grey);
    display:block;
    margin-bottom:8px;
  }
  .nickname-card input{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--border-grey);
    background: #000;
    color: #ff3333;
    border-radius:8px;
    font-size:14px;
    outline:none;
  }
  .nickname-card input:focus{
    border-color:var(--main-blue);
    box-shadow: 0 0 8px rgba(255,0,0,0.3);
  }
  .live-score-tip{
    margin-top:10px;
    font-size:12px;
    color:var(--text-dark);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .live-score-tip b{font-size:15px; color:#ff0000;}

  .q-card{
    background:var(--card-bg);
    border-radius:12px;
    padding:18px 18px 14px;
    margin-bottom:14px;
    box-shadow:0 2px 10px rgba(0,0,0,.5);
    border:1px solid var(--border-grey);
    transition:border-color .2s;
  }
  .q-card.answered{
    border-color:#550000;
  }
  .q-card .cat-tag{
    display:inline-block;
    font-size:11px;
    color:#ff6666;
    background:#2a0000;
    padding:2px 8px;
    border-radius:10px;
    margin-bottom:8px;
    cursor:help;
    position:relative;
  }
  .q-card .cat-tag .tooltip{
    display:none;
    position:absolute;
    top:120%;
    left:0;
    background:#ff0000;
    color:#000;
    font-size:11px;
    padding:6px 9px;
    border-radius:6px;
    width:200px;
    line-height:1.5;
    z-index:20;
    box-shadow:0 4px 10px rgba(255,0,0,.2);
  }
  .q-text{
    font-size:15px;
    font-weight:600;
    line-height:1.6;
    margin-bottom:12px;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .option{
    border:1px solid var(--border-grey);
    border-radius:8px;
    padding:10px 12px;
    font-size:13.5px;
    cursor:pointer;
    position:relative;
    padding-left:36px;
    transition:background .15s, border-color .15s;
    background:#0a0a0a;
    color: #ff3333;
  }
  .option:hover{
    background:#1a0000;
    border-color:#660000;
  }
  .option::before{
    content:"";
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid #550000;
    background:#000;
  }
  .option.selected{
    border-color:var(--main-blue);
    background:#220000;
    font-weight:600;
    text-shadow: 0 0 5px rgba(255,0,0,0.5);
  }
  .option.selected::before{
    border-color:#ff0000;
    background:#ff0000;
    box-shadow:inset 0 0 0 3px #000;
  }
  .feedback{
    margin-top:6px;
    font-size:12.5px;
    line-height:1.6;
    color:#ff6666;
    background:#1a0000;
    border-left:3px solid var(--main-blue);
    padding:8px 10px;
    border-radius:0 6px 6px 0;
    animation:fadeIn .25s ease;
  }
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(-4px);}
    to{opacity:1; transform:translateY(0);}
  }

  .submit-wrap{
    text-align:center;
    margin:26px 0 10px;
  }
  #submitBtn{
    background:var(--main-blue);
    color:#fff;
    border:none;
    padding:13px 46px;
    font-size:15px;
    border-radius:26px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(204,0,0,.35);
    transition:transform .15s, background .15s;
  }
  #submitBtn:hover{
    background:#ff0000;
    transform:translateY(-1px);
    box-shadow:0 8px 25px rgba(255,0,0,.5);
  }
  #submitBtn:disabled{
    background:#330000;
    color:#888;
    box-shadow:none;
    cursor:not-allowed;
  }
  .unanswered-tip{
    font-size:12px;
    color:var(--danger);
    margin-top:8px;
    min-height:16px;
  }

  .modal-mask{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    z-index:1000;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .modal-mask.show{
    display:flex;
  }
  .modal-box{
    background:#111;
    border: 1px solid #550000;
    border-radius:16px;
    max-width:440px;
    width:100%;
    max-height:86vh;
    overflow-y:auto;
    padding:28px 24px 22px;
    position:relative;
    animation:popIn .25s ease;
    box-shadow: 0 0 30px rgba(255,0,0,0.2);
  }
  @keyframes popIn{
    from{opacity:0; transform:scale(.92);}
    to{opacity:1; transform:scale(1);}
  }
  .modal-box .close-x{
    position:absolute;
    right:16px;
    top:14px;
    font-size:20px;
    color:#550000;
    cursor:pointer;
    line-height:1;
  }
  .modal-box .close-x:hover{color:#ff0000;}
  .result-level{
    font-size:13px;
    color:#000;
    display:inline-block;
    padding:4px 12px;
    border-radius:14px;
    margin-bottom:14px;
    font-weight: bold;
  }
  .modal-box h2{
    margin:0 0 6px;
    font-size:20px;
    color: #ff0000;
  }
  .modal-box .score-num{
    font-size:42px;
    font-weight:800;
    color:var(--danger);
    margin:6px 0 2px;
    text-shadow: 0 0 10px rgba(255,0,0,0.4);
  }
  .modal-box .score-total{
    font-size:13px;
    color:var(--text-grey);
    margin-bottom:16px;
  }
  .modal-box .desc{
    font-size:14px;
    line-height:1.8;
    color:#ffcccc;
    background:#1a0000;
    border-radius:10px;
    padding:14px;
    margin-bottom:14px;
    border: 1px solid #330000;
  }
  .modal-box .bar-outer{
    height:10px;
    background:#220000;
    border-radius:6px;
    overflow:hidden;
    margin-bottom:6px;
  }
  .modal-box .bar-inner{
    height:100%;
    background:linear-gradient(90deg,#880000,var(--danger));
    width:0%;
    transition:width .6s ease;
  }
  .cat-breakdown{
    margin-top:16px;
    font-size:12px;
    color:var(--text-grey);
  }
  .cat-breakdown .row{
    display:flex;
    justify-content:space-between;
    padding:4px 0;
    border-bottom:1px dashed #330000;
  }
  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  .modal-actions button{
    flex:1;
    padding:11px 0;
    border-radius:22px;
    border:none;
    font-size:13.5px;
    cursor:pointer;
  }
  #retestBtn{
    background:#220000;
    color:#ff6666;
    border: 1px solid #550000;
  }
  #retestBtn:hover{background:#330000;}
  #shareBtn{
    background:var(--main-blue);
    color:#fff;
  }
  #shareBtn:hover{background:#ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.5);}

  .toast{
    position:fixed;
    left:50%;
    bottom:30px;
    transform:translateX(-50%) translateY(20px);
    background:#ff0000;
    color:#000;
    font-weight: bold;
    padding:10px 18px;
    border-radius:20px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:all .3s ease;
    z-index:1100;
    box-shadow: 0 0 15px rgba(255,0,0,0.5);
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  footer.note{
    text-align:center;
    font-size:11.5px;
    color:#660000;
    margin-top:26px;
    padding:0 30px;
    line-height:1.8;
  }
</style>
</head>
<body>

<div id="progressBar"><div id="progressFill"></div></div>

<header class="top">
  <h1>🩸 掌控深渊：暗黑心理指数评估</h1>
  <p>50道直击灵魂的残酷拷问。在极致的爱与癫狂的占有之间，你会越界多少次？不要试图欺骗自己，黑暗中的眼睛正在注视着你的每一个选择。</p>
  <div class="meta-row">
    <span>深渊考题 50 级</span>
    <span id="answeredCountTop">已沉沦 0 / 50</span>
    <span>约 8 分钟</span>
  </div>
</header>

<div class="container">

  <div class="nickname-card">
    <label for="nicknameInput">代号（测试结果将铭刻此名） 👇</label>
    <input id="nicknameInput" type="text" placeholder="输入你在黑暗中的名字..." maxlength="12"
           oninput="onNicknameInput(this.value)">
    <div class="live-score-tip">绝对掌控力实时波动：<b id="liveScore">0</b> / 200  <span id="liveTag">（静默中）</span></div>
  </div>

  <div id="questionList"></div>

  <div class="submit-wrap">
    <button id="submitBtn" onclick="handleSubmit()" disabled>揭开我的病态底牌</button>
    <div class="unanswered-tip" id="unansweredTip"></div>
  </div>

  <footer class="note">
    警告：本测试涉及极端控制、越界探寻与病娇心理模拟。<br>
    若测试结果让你感到极度兴奋，请务必克制你在现实中的行为。爱是囚笼，但钥匙不该被吞下。
  </footer>
</div>

<div class="modal-mask" id="resultModal">
  <div class="modal-box">
    <span class="close-x" onclick="closeModal()">✕</span>
    <span class="result-level" id="resultLevelTag">—</span>
    <h2 id="resultTitle">诊断书</h2>
    <div class="score-num" id="resultScoreNum">0</div>
    <div class="score-total">恶化指数 / 200，深渊完成度 <span id="resultPercent">0%</span></div>
    <div class="bar-outer"><div class="bar-inner" id="resultBar"></div></div>
    <div class="desc" id="resultDesc"></div>
    <div class="cat-breakdown" id="catBreakdown"></div>
    <div class="modal-actions">
      <button id="retestBtn" onclick="retest()">重新伪装一次</button>
      <button id="shareBtn" onclick="shareResult()">分享我的病历</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  "情感索取": "无底洞般榨取确认感与存在感。",
  "空间侵占": "哪怕是呼吸的空气也不允许独享。",
  "服从与规训": "把平等的爱扭曲为绝对的从属协议。",
  "惩罚与威慑": "以痛觉建立统治的施虐法则。",
  "肉体与标记": "用气味、痕迹等动物本能宣示私有权。",
  "依附与共生": "打断骨头连着筋的病态互相寄生。",
  "极端与毁灭": "得不到就彻底粉碎，死亡才是永恒。"
};

const LEVELS = [
  { max: 74,  tag: "清醒路人", color: "#666666",
    title: "理智边界守卫者",
    desc: "你的分数低得不像来做这个测试的。在你的世界里，爱是自由意志的沉沦，而不是互相捆绑的铁链。你极度尊重对方的隐私和自由，甚至有时候理智得让人觉得有点冷血。保持这种松弛感，但偶尔也可以假装吃点醋，给平淡的生活加点戏。" },
  { max: 124, tag: "微酸玩家", color: "#aa0000",
    title: "隐忍的吃醋机器",
    desc: "你心里住着一头想要霸占对方的小野兽，但你用成人的体面把它锁在了笼子里。你会在意TA看了谁、去了哪，但大多数时候只是自己生闷气或暗搓搓地试探。你的控制欲还在安全线内，只是内耗有点严重，试着直接把需求吼出来吧。" },
  { max: 164, tag: "危险分子", color: "#ff3333",
    title: "高压控制狂雏形",
    desc: "警告！你的占有欲已经开始发烂发臭。你需要掌控对方的密码、行踪甚至是呼吸频率才能感到安心。你的爱像是一张越收越紧的网，TA稍微挣扎一下你就会如临大敌。你正在把伴侣逼向窒息的边缘，如果不学会放权，这场关系终将以爆炸收场。" },
  { max: 9999, tag: "深渊病娇", color: "#ff0000",
    title: "不可救药的病态囚徒",
    desc: "警报拉响！你根本不是在寻找伴侣，你是在寻找一个任你摆布的木偶、一个被拔掉牙齿关在笼子里的宠物。你的选项里充满了毁灭、囚禁和极端的自私。对你来说，如果不能百分之百占有，那就连同世界一起毁掉。这份爱太沉重，重到带着血腥味。请立刻反思自己，或挂号精神科。" }
];

const answers = {};
let nickname = "";

function renderQuestions(){
  const list = document.getElementById("questionList");
  list.innerHTML = "";

  QUIZ_DATA.forEach(q => {
    const card = document.createElement("div");
    card.className = "q-card";
    card.id = "qcard-" + q.id;

    const tag = document.createElement("span");
    tag.className = "cat-tag";
    tag.textContent = q.category;
    tag.addEventListener("mouseenter", function(){
      let tip = tag.querySelector(".tooltip");
      if(!tip){
        tip = document.createElement("div");
        tip.className = "tooltip";
        tip.textContent = CAT_TOOLTIP[q.category] || "病态掌控的一个切面。";
        tag.appendChild(tip);
      }
      tip.style.display = "block";
    });
    tag.addEventListener("mouseleave", function(){
      const tip = tag.querySelector(".tooltip");
      if(tip) tip.style.display = "none";
    });
    card.appendChild(tag);

    const qText = document.createElement("div");
    qText.className = "q-text";
    qText.textContent = q.text;
    card.appendChild(qText);

    const optWrap = document.createElement("div");
    optWrap.className = "options";

    q.options.forEach((opt, idx) => {
      const optDiv = document.createElement("div");
      optDiv.className = "option";
      optDiv.textContent = opt.text;
      optDiv.setAttribute("onclick", `selectOption(${q.id}, ${idx})`);
      optDiv.id = `opt-${q.id}-${idx}`;
      optWrap.appendChild(optDiv);

      const fbDiv = document.createElement("div");
      fbDiv.className = "feedback";
      fbDiv.id = `fb-${q.id}-${idx}`;
      fbDiv.style.display = "none";
      fbDiv.textContent = "🩸 " + opt.feedback;
      optWrap.appendChild(fbDiv);
    });

    card.appendChild(optWrap);
    list.appendChild(card);
  });
}

function selectOption(qid, optIdx){
  const q = QUIZ_DATA.find(x => x.id === qid);
  const opt = q.options[optIdx];

  q.options.forEach((o, i) => {
    document.getElementById(`opt-${qid}-${i}`).classList.remove("selected");
    document.getElementById(`fb-${qid}-${i}`).style.display = "none";
  });

  document.getElementById(`opt-${qid}-${optIdx}`).classList.add("selected");
  document.getElementById(`fb-${qid}-${optIdx}`).style.display = "block";
  document.getElementById(`qcard-${qid}`).classList.add("answered");

  answers[qid] = { score: opt.score, optionIndex: optIdx };
  updateProgress();
}

function updateProgress(){
  const answeredCount = Object.keys(answers).length;
  const total = QUIZ_DATA.length;
  const pct = Math.round((answeredCount / total) * 100);

  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("answeredCountTop").textContent = `已沉沦 ${answeredCount} / ${total}`;

  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = answeredCount < total;

  let sum = 0;
  Object.values(answers).forEach(a => sum += a.score);
  document.getElementById("liveScore").textContent = sum;

  const liveTag = document.getElementById("liveTag");
  if(answeredCount === 0){
    liveTag.textContent = "（静默中）";
    liveTag.style.color = "#888";
  } else {
    const level = getLevel(sum);
    liveTag.textContent = `（病变趋势：${level.tag}）`;
    liveTag.style.color = level.color;
  }

  if(answeredCount === total){
    document.getElementById("unansweredTip").textContent = "";
  }
}

function onNicknameInput(val){
  nickname = val.trim();
}

function getLevel(score){
  return LEVELS.find(l => score <= l.max);
}

function handleSubmit(){
  const total = QUIZ_DATA.length;
  const answeredCount = Object.keys(answers).length;

  if(answeredCount < total){
    const tip = document.getElementById("unansweredTip");
    tip.textContent = `深渊未满，还差 ${total - answeredCount} 题，别想逃跑。`;
    const firstUnanswered = QUIZ_DATA.find(q => !answers[q.id]);
    if(firstUnanswered){
      document.getElementById("qcard-" + firstUnanswered.id).scrollIntoView({behavior:"smooth", block:"center"});
    }
    return;
  }

  let sum = 0;
  const catScores = {};
  QUIZ_DATA.forEach(q => {
    const a = answers[q.id];
    sum += a.score;
    catScores[q.category] = (catScores[q.category] || 0) + a.score;
  });

  const level = getLevel(sum);
  const pct = Math.round((sum / 200) * 100);

  const nameShow = nickname ? nickname : "代号X";
  document.getElementById("resultLevelTag").textContent = level.tag;
  document.getElementById("resultLevelTag").style.background = level.color;
  document.getElementById("resultLevelTag").style.color = "#fff";
  document.getElementById("resultTitle").textContent = `[${nameShow}] 的最终诊断：${level.title}`;
  document.getElementById("resultScoreNum").textContent = sum;
  document.getElementById("resultPercent").textContent = pct + "%";
  document.getElementById("resultDesc").textContent = level.desc;

  const breakdown = document.getElementById("catBreakdown");
  breakdown.innerHTML = "<div style='margin-bottom:6px;font-weight:600;color:#ff3333;'>各病态维度得分（分数越高越危险）</div>";
  Object.keys(catScores).forEach(cat => {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `<span>${cat}</span><span style="color:#ff0000;font-weight:bold;">${catScores[cat]}</span>`;
    breakdown.appendChild(row);
  });

  const modal = document.getElementById("resultModal");
  modal.classList.add("show");

  const bar = document.getElementById("resultBar");
  bar.style.width = "0%";
  setTimeout(() => { bar.style.width = pct + "%"; }, 80);
}

function closeModal(){
  document.getElementById("resultModal").classList.remove("show");
}

function retest(){
  for(const k in answers) delete answers[k];
  closeModal();
  renderQuestions();
  updateProgress();
  document.getElementById("unansweredTip").textContent = "";
  window.scrollTo({top:0, behavior:"smooth"});
  showToast("记忆已重置，欢迎回到深渊。");
}

function shareResult(){
  const sum = document.getElementById("resultScoreNum").textContent;
  const title = document.getElementById("resultTitle").textContent;
  const text = `【掌控深渊测试】${title}，病变指数 ${sum}/200。嘘，谁是被我锁在地下室的人？`;

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(() => {
      showToast("诊断书已复制，去找你的猎物吧。");
    }).catch(() => {
      showToast("系统阻断了你的复制，请手动截图。");
    });
  } else {
    showToast("当前环境不支持自动复制，请手动截图。");
  }
}

function showToast(msg){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => {
    toast.classList.remove("show");
  }, 2200);
}

document.addEventListener("DOMContentLoaded", function(){
  renderQuestions();
  updateProgress();

  document.getElementById("resultModal").addEventListener("click", function(e){
    if(e.target === this) closeModal();
  });
});
</script>
</body>
</html>
